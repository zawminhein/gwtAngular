<div class="container-fluid mt-3">

  <!-- Page Header -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Menu Setup</h5>
    <button class="btn btn-primary btn-sm" (click)="router.navigate(['/menu-info'])">
      + New Menu
    </button>
  </div>

  <!-- Search Panel -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-center">
        <div class="col-md-4">
          <input type="text"
                 class="form-control form-control-sm"
                 placeholder="Search menu code or description"
                 [(ngModel)]="searchtxt"
                 (keyup.enter)="search()">
        </div>
        <div class="col-md-auto">
          <button class="btn btn-primary btn-sm" (click)="search()">
            <i class="fa fa-search"></i>
          </button>
        </div>
        <div class="col-md-auto">
          <button class="btn btn-secondary btn-sm" (click)="clear()">
            <i class="fa fa-refresh"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Menu Table -->
  <div class="card">
    <div class="table-responsive">
      <table class="table table-sm table-hover table-striped mb-0">
        <thead class="table-light">
          <tr>
            <th>Code</th>
            <th>Description</th>
            <th>Link</th>
            <th>Parent Menu</th>
            <th>SubParent Menu</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of menuList">
            <td><a href="javascript:void(0)" (click)="openMenu(data)" class="text-primary text-decoration-none">{{data.code}}</a></td>
            <td>{{data.desc}}</td>
            <td>{{data.rout}}</td>
            <td>{{data.pDesc}}</td>
            <td>{{data.subPDesc}}</td>
          </tr>
          <tr *ngIf="menuList.length === 0">
            <td colspan="5" class="text-center text-muted py-3">No menu records found</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="card-footer d-flex justify-content-between align-items-center">
      <div class="btn-group btn-group-sm">
        <button class="btn btn-outline-secondary" (click)="startPage()" [disabled]="pager.currentPage === 1">
          Start
        </button>
        <button class="btn btn-outline-secondary" (click)="prevPage()" [disabled]="pager.currentPage === 1">
          Previous
        </button>
        <button class="btn btn-outline-secondary disabled">
          Page {{ pager.currentPage }} of {{ totalPages }}
        </button>
        <button class="btn btn-outline-secondary" (click)="nextPage()" [disabled]="pager.currentPage >= totalPages">
          Next
        </button>
        <button class="btn btn-outline-secondary" (click)="lastPage()" [disabled]="pager.currentPage >= totalPages">
          Last
        </button>
      </div>
      <div>
        Showing {{ startItem }} – {{ endItem }} of {{ pager.totalItems }}
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div *ngIf="isLoading" class="position-fixed top-50 start-50 translate-middle text-center bg-secondary bg-opacity-10 p-4 rounded shadow-sm text-dark">
    <div class="spinner-border text-secondary"></div>
    <div class="mt-2">Please wait...</div>
  </div>
</div>
