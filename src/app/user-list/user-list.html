<div class="container mt-3">

  <h3 class="mb-3">User List</h3>

  <!-- ================= SEARCH SECTION ================= -->
  <div class="row mb-3">

    <!-- Search Text -->
    <div class="col-md-4">
      <input
        type="text"
        class="form-control"
        placeholder="Search user..."
        [(ngModel)]="searchtxt"
        (keyup.enter)="searchUser()"
      />
    </div>

    <!-- Role Dropdown -->
    <div class="col-md-3">
      <select class="form-select">
        <option value="">All Roles</option>
        <option *ngFor="let role of _roleData" [value]="role.roleId">
          {{ role.roleName }}
        </option>
      </select>
    </div>

    <!-- Buttons -->
    <div class="col-md-5 text-end">
      <button class="btn btn-primary me-2" (click)="searchUser()">
        Search
      </button>
      <button class="btn btn-secondary" (click)="clear()">
        Clear
      </button>
    </div>

  </div>

  <!-- ================= LOADING ================= -->
  <div *ngIf="isLoading === true" class="text-center my-4">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- ================= TABLE ================= -->
  <div *ngIf="isLoading === false">

    <table class="table table-bordered table-hover">

      <thead class="table-light">
        <tr>
          <th>User ID</th>
          <th>Username</th>
        </tr>
      </thead>

      <tbody>

        <!-- Data Rows -->
        <tr *ngFor="let user of userData">
          <td>{{ user.userid }}</td>
          <td>{{ user.username }}</td>
        </tr>

        <!-- Empty State -->
        <tr *ngIf="userData.length === 0">
          <td colspan="3" class="text-center text-muted">
            No users found
          </td>
        </tr>

      </tbody>

    </table>

  </div>

  <!-- ================= PAGINATION ================= -->
  <div class="d-flex justify-content-between align-items-center mt-3">

    <button
      class="btn btn-outline-primary"
      [disabled]="_pagerData.currentPage === 1"
      (click)="changePage(_pagerData.currentPage - 1)">
      Previous
    </button>

    <span>
      Page {{ _pagerData.currentPage }}
    </span>

    <button
      class="btn btn-outline-primary"
      [disabled]="userData.length < _pagerData.itemsPerPage"
      (click)="changePage(_pagerData.currentPage + 1)">
      Next
    </button>

  </div>

</div>
