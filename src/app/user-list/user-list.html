<div class="container mt-3">
  <h4>User List</h4>

  <div class="row mb-2">
    <div class="col-sm-4 d-flex">
      <input type="text" class="form-control form-control-sm" placeholder="Search" [(ngModel)]="searchtxt" (keyup.enter)="search()">
      <button class="btn btn-sm btn-primary ms-1" (click)="search()">Search</button>
      <button class="btn btn-sm btn-secondary ms-1" (click)="clear()">Clear</button>
    </div>
  </div>

  <div *ngIf="isLoading">Loading...</div>

  <div class="table-responsive">
    <table class="table table-bordered table-hover table-sm">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Name</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of userData">
          <td (click)="goDetail(user)" style="cursor: pointer">{{user.userid}}</td>
          <td>{{user.username}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
