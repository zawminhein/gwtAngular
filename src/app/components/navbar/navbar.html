<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">

    <!-- Brand -->
    <a class="navbar-brand fw-bold" [routerLink]="['/dashboard']">
      MyApp
    </a>

    <!-- Mobile Toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent" #navbarCollapse>

      <!-- LEFT SIDE MENU -->
      <ul class="navbar-nav me-auto">

        <li class="nav-item dropdown" *ngFor="let menu of menus">
          
          <!-- Top Level - has children or subParent -->
          <a *ngIf="hasSubItems(menu)" class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">
            {{ menu.title }}
          </a>

          <!-- Top Level - no children or subParent -->
          <a *ngIf="!hasSubItems(menu)" 
            class="nav-link" 
            [routerLink]="getRouterLink(menu)"
            (click)="closeNavbar()">
            {{ menu.title }}
          </a>

          <!-- Dropdown Menu (handles both child and subParent) -->
          <ul class="dropdown-menu" *ngIf="hasSubItems(menu)">
            
            <!-- Direct Children (if any) -->
            <li *ngFor="let child of menu.child" class="dropdown-submenu position-relative">
              <a 
                class="dropdown-item" 
                [routerLink]="getRouterLink(menu, child)"
                (click)="closeNavbar()">
                {{ child.title }}
              </a>
            </li>

            <!-- SubParent Level -->
            <li *ngFor="let sub of menu.subParent" class="dropdown-submenu position-relative">

              <!-- SubParent with children -->
              <a *ngIf="sub.child?.length" 
                class="dropdown-item dropdown-toggle" 
                (click)="toggleSubMenu($event)">
                {{ sub.title }}
              </a>

              <!-- SubParent without children -->
              <a 
                *ngIf="!sub.child?.length" 
                class="dropdown-item" 
                [routerLink]="getRouterLink(menu, sub)" 
                (click)="closeNavbar()">
                {{ sub.title }}
              </a>

              <!-- Third Level - SubParent's Children -->
              <ul class="dropdown-menu" *ngIf="sub.child?.length">
                <li *ngFor="let child of sub.child">
                  <a 
                    class="dropdown-item" 
                    [routerLink]="getRouterLink(menu, sub, child)"
                    (click)="closeNavbar()">
                    {{ child.title }}
                  </a>
                </li>
              </ul>

            </li>
          </ul>

        </li>

        <li class="nav-item dropdown">
          <a  class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">Schedule</a>

          <ul class="dropdown-menu">
            <li>
              <a [routerLink]="['/dashboard/room']"  class="dropdown-item">Room</a>
            </li>
            <li><a href="#" class="dropdown-item">Doctor Schedule</a></li>
            <li><a href="#" class="dropdown-item">Doctor Setup</a></li>
          </ul>
        </li>

      </ul>


      <!-- RIGHT SIDE USER INFO -->
      <ul class="navbar-nav align-items-center">
        <li class="nav-item text-white me-3"><span><i class="fas fa-user"></i></span> {{ username }}</li>
        <li class="nav-item">
          <button class="btn btn-danger btn-sm" (click)="logout()">Logout</button>
        </li>
      </ul>

    </div>
  </div>
</nav>
