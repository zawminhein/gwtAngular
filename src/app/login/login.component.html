<div class="container-fluid bg-light vh-100">
  <div class="container vh-100">
    <div class="row align-items-center vh-100">
      <div class="col-lg-4 mx-auto">
        <div class="bg-white p-5 rounded shadow-lg">

          <!-- Error Message -->
          <div *ngIf="errorMessage" class="alert alert-danger py-2 small">
            <i class="fa fa-exclamation-circle me-2"></i>
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="login($event)">

            <h3 class="mb-3 text-center fw-bold"
                style="font-family:'Times New Roman', Times, serif;">
              Login
            </h3>

            <!-- Username -->
            <div class="mb-2">
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="fa fa-user text-secondary"></i>
                </span>
                <input
                  type="text"
                  class="form-control"
                  placeholder="User ID"
                  name="username"
                  [(ngModel)]="username"
                  (ngModelChange)="errorMessage=''"
                  autofocus
                >
              </div>
            </div>

            <!-- Password -->
            <div class="mb-2">
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="fa fa-key text-secondary"></i>
                </span>
                <input
                  type="password"
                  class="form-control"
                  placeholder="Password"
                  name="password"
                  [(ngModel)]="password"
                  (ngModelChange)="errorMessage=''"
                >
              </div>
            </div>

            <!-- Domain -->
            <div class="mb-2">
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="fa fa-globe text-secondary"></i>
                </span>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Domain"
                  name="domain"
                  [(ngModel)]="domain"
                  (ngModelChange)="errorMessage=''"
                >
              </div>
            </div>

            <!-- Remember Me -->
            <div class="form-check mb-2">
              <input
                class="form-check-input"
                type="checkbox"
                id="remember"
                name="rememberMe"
                [(ngModel)]="rememberMe"
              >
              <label for="remember" class="form-check-label ms-1">
                Remember me
              </label>
            </div>

            <!-- Button -->
            <button 
              type="submit" 
              class="btn btn-outline-primary w-100 mt-2"
              [disabled]="isLoading">

              <!-- Normal State -->
              <ng-container *ngIf="!isLoading">
                <i class="fa fa-sign-in-alt me-2"></i>
                Sign In
              </ng-container>

              <!-- Loading State -->
              <ng-container *ngIf="isLoading">
                <span class="spinner-border spinner-border-sm me-2"></span>
                Signing In...
              </ng-container>

            </button>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
